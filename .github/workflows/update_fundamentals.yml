name: Actualizar Fundamentales DeepView

on:
  schedule:
    - cron: '0 4 * * 6'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Descargar codigo
      uses: actions/checkout@v4

    - name: Configurar Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Instalar librerias
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Ejecutar Extractor de Fundamentales
      run: python build_fundamentals.py

    - name: Guardar fundamentals.js
      run: |
        git config --global user.name "DeepView Bot"
        git config --global user.email "bot@deepview.internal"
        git add fundamentals.js
        git commit -m "Fundamentales actualizados en background" || exit 0
        git push
