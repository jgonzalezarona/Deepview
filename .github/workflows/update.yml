name: Actualizar Datos DeepView

on:
  schedule:
    - cron: '0 9 * * 1-5'
    - cron: '30 10 * * 1-5'
    - cron: '0 12 * * 1-5'
    - cron: '30 13 * * 1-5'
    - cron: '0 15 * * 1-5'
    - cron: '30 16 * * 1-5'
    - cron: '0 18 * * 1-5'
    - cron: '30 19 * * 1-5'
    - cron: '0 21 * * 1-5'
    - cron: '0 22 * * 1-5'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Descargar codigo
      uses: actions/checkout@v4

    - name: Configurar Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Instalar librerias
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Ejecutar Extractor de Precios
      run: python build_feed.py

    - name: Guardar feed.js
      run: |
        git config --global user.name "DeepView Bot"
        git config --global user.email "bot@deepview.internal"
        git add feed.js
        git commit -m "Precios actualizados en background" || exit 0
        git push
