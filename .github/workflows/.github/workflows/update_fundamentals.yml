name: Actualizar Fundamentales DeepView

on:
  schedule:
    # Se ejecuta automaticamente todos los sabados a las 04:00 UTC
    # Los datos fundamentales no cambian intradia, basta con una vez por semana
    - cron: '0 4 * * 6'
  workflow_dispatch: # Permite activarlo manualmente desde el movil cuando quieras

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Permiso para guardar el archivo fundamentals.js

    steps:
    - name: Descargar codigo del repositorio
      uses: actions/checkout@v4

    - name: Configurar entorno de Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Instalar librerias de programacion
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Ejecutar script de fundamentales
      # NOTA: Asegurate de que el archivo en tu GitHub se llama exactamente asi,
      # o cambia "actualizar_fundamentales.py" por el nombre real de tu script.
      run: python actualizar_fundamentales.py

    - name: Guardar y publicar fundamentales actualizados
      run: |
        git config --global user.name "DeepView Bot"
        git config --global user.email "bot@deepview.internal"
        git add fundamentals.js
        git commit -m "Fundamentales actualizados en background" || exit 0
        git push
