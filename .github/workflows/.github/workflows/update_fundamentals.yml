name: Actualizar Fundamentales DeepView

on:
  schedule:
    # Se ejecuta automáticamente todos los sábados a las 04:00 UTC
    - cron: '0 4 * * 6'
  workflow_dispatch: # Permite que lo actives manualmente desde el móvil pulsando un botón

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Permiso clave para que el bot pueda guardar el archivo fundamentals.js

    steps:
    - name: Descargar codigo del repositorio
      uses: actions/checkout@v4

    - name: Configurar entorno de Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Instalar librerias de programacion
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Ejecutar script de fundamentales
      run: python build_fundamentals.py

    - name: Guardar y publicar fundamentales actualizados
      run: |
        git config --global user.name "DeepView Bot"
        git config --global user.email "bot@deepview.internal"
        git add fundamentals.js
        git commit -m "Fundamentales actualizados en background" || exit 0
        git push
